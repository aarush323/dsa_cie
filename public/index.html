<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pune Navigator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Font 'Outfit' for a modern, sleek tech look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-wrapper">
        <!-- Floating Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
                        <circle cx="12" cy="9" r="2.5" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Smart Pune Navigator</h1>
                    <p>Real-time Route Optimization</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="status-badge">
                    <span class="pulse-dot"></span>
                    <span>Live System</span>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="theme-icon-sun hidden">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="theme-icon-moon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Interactive Map Canvas -->
        <main class="main-content">
            <div class="graph-section">
                <!-- A soft grid backdrop for the map -->
                <div class="map-grid"></div>
                <svg id="graph-svg" class="interactive-map"></svg>
                <div id="selection-prompt" class="selection-prompt">
                    Click on the map to set your start and destination
                </div>
            </div>

            <!-- Floating Sidebar overlay on top left -->
            <aside class="floating-controls glass-panel">
                <div class="panel selection-panel">
                    <h2>Plan Your Route</h2>
                    <div class="input-group">
                        <label for="source-select">Starting Point</label>
                        <div class="select-wrapper">
                            <select id="source-select"></select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="dest-select">Destination</label>
                        <div class="select-wrapper">
                            <select id="dest-select"></select>
                        </div>
                    </div>
                    <button id="find-route-btn" class="btn-primary">
                        Find Shortest Route
                    </button>
                    <!-- Small instruction label -->
                    <p class="helper-text">You can also directly click the points on the canvas.</p>
                </div>
            </aside>
        </main>
    </div>

    <!-- Centered Modal for Results Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="result-wrapper" class="result-wrapper glass-panel hidden">
            <div class="result-header">
                <div class="result-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                    <h2>Route Found</h2>
                </div>
                <button id="close-modal" class="btn-close" aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="result-body">
                <div class="route-info-col">
                    <!-- Distance highlights -->
                    <div class="route-summary">
                        <div class="route-distance" id="route-distance"></div>
                        <p class="route-path" id="route-path"></p>
                    </div>
                    <button class="btn-secondary" id="action-replan">Plan Another Route</button>
                </div>

                <!-- Trace Information inside Modal -->
                <div class="trace-section">
                    <h3>Algorithm Trace</h3>
                    <p class="trace-subtitle">Dijkstra's step-by-step execution path</p>
                    <div id="trace-steps" class="trace-steps"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
