<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pune Navigator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88" fill="currentColor"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Smart Pune Navigator</h1>
                    <p>Real-time Route Optimization</p>
                </div>
            </div>
            <div class="status-badge">
                <span class="pulse-dot"></span>
                <span>Live</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Graph Section -->
            <section class="graph-section">
                <div class="graph-container">
                    <svg id="graph-svg" viewBox="0 0 600 500"></svg>
                    <div id="selection-prompt" class="selection-prompt">
                        Click on the map to select your start and destination
                    </div>
                </div>
            </section>

            <!-- Controls + Results Section -->
            <section class="sidebar">
                <!-- Selection Panel -->
                <div class="panel selection-panel">
                    <h2>Plan Your Route</h2>
                    <div class="input-group">
                        <label for="source-select">Starting Point</label>
                        <div class="select-wrapper">
                            <select id="source-select"></select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="dest-select">Destination</label>
                        <div class="select-wrapper">
                            <select id="dest-select"></select>
                        </div>
                    </div>
                    <button id="find-route-btn" class="btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path d="M3 11l19-9-9 19-2-8z"/>
                        </svg>
                        Find Shortest Route
                    </button>
                </div>

                <!-- Result Panel -->
                <div id="result-panel" class="panel result-panel hidden">
                    <h2>Route Result</h2>
                    <div class="route-display">
                        <div id="route-path" class="route-path"></div>
                        <div id="route-distance" class="route-distance"></div>
                    </div>
                </div>

                <!-- Trace Panel -->
                <div id="trace-panel" class="panel trace-panel hidden">
                    <h2>Algorithm Trace</h2>
                    <p class="trace-subtitle">Dijkstra's step-by-step execution</p>
                    <div id="trace-steps" class="trace-steps"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
